name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.14.4

      - name: Check requirements files are in sync
        run: diff requirements.txt backend/requirements.txt

      - name: Lint
        run: ruff check backend/app backend/tests backend/scripts backend/evals

      - name: Run tests
        working-directory: backend
        run: python -m unittest discover tests
